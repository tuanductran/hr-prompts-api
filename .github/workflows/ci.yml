name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome CI
        run: bun run ci

      - name: Type check
        run: bun tsc --noEmit

      - name: Unit tests
        run: bun test

      - name: Spell check
        run: bun run spell

      - name: Markdown lint
        run: bun run mdlint
