openapi: 3.1.0
info:
  title: HR Prompt Knowledge Base API (Minimal)
  description: |
    Minimal API for the HR Expert Custom GPT. Provides HR-scoped prompts for workforce management domains only.
  version: 1.0.0
servers:
  - url: https://your-domain.vercel.app
    description: Production server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas: {}
security:
  - bearerAuth: []
paths:
  /categories:
    get:
      summary: List HR categories
      operationId: getCategories
      responses:
        "200":
          description: List of HR categories
          content:
            application/json:
              schema:
                type: object
                required:
                  - categories
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id:
                          type: string
                        name:
                          type: string
  /topics:
    get:
      summary: List HR topics (optionally by category)
      operationId: getTopics
      parameters:
        - name: category_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of HR topics
          content:
            application/json:
              schema:
                type: object
                required:
                  - topics
                properties:
                  topics:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                        - categoryId
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        categoryId:
                          type: string
  /topics/{topic_id}:
    get:
      summary: Get topic with HR prompts
      operationId: getTopicById
      parameters:
        - name: topic_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Topic and associated prompts
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - name
                  - prompts
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  prompts:
                    type: array
                    items:
                      type: object
                      required:
                        - number
                        - text
                      properties:
                        number:
                          type: number
                        text:
                          type: string
        "404":
          description: Topic not found
  /search:
    get:
      summary: Search HR prompts
      operationId: searchPrompts
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: category_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required:
                  - results
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      required:
                        - topicId
                        - matchedPrompts
                      properties:
                        topicId:
                          type: string
                        matchedPrompts:
                          type: array
                          items:
                            type: object
                            required:
                              - number
                              - text
                            properties:
                              number:
                                type: number
                              text:
                                type: string
  /prompts/random:
    get:
      summary: Get random HR prompts
      operationId: getRandomPrompts
      parameters:
        - name: category_id
          in: query
          required: false
          schema:
            type: string
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 5
      responses:
        "200":
          description: Random HR prompts
          content:
            application/json:
              schema:
                type: object
                required:
                  - prompts
                properties:
                  prompts:
                    type: array
                    items:
                      type: object
                      required:
                        - topicId
                        - number
                        - text
                      properties:
                        topicId:
                          type: string
                        number:
                          type: number
                        text:
                          type: string
